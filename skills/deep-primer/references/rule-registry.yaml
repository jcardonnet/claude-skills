# =============================================================================
# Deep Primer — Rule Registry (V1)
# =============================================================================
# Source of truth for the deep-primer generation pipeline. Three consumers:
#   1. The GENERATOR  reads the must_core tier (resident) + the pipeline procedure.
#   2. The CRITICS    read soft_critic rules as binary rubric questions, one
#                     rule-category per scoped pass.
#   3. The LINTER     implements every hard_lint `check` deterministically.
# Human-readable companion (kept in lockstep, hand-maintained in V1): rule-registry.md
# Rationale + effect sizes live in the Combined Evidence Map ("EM"), not here.
# -----------------------------------------------------------------------------

meta:
  version: 0.1.0
  applies_to: "deep-primer skill, HTML output"
  source_documents:
    - "primer-writing-styleguide.md (generalized)"
    - "primer-design-evidence-map-combined.md (EM — rationale/evidence)"
  legend:
    priority:
      MUST: "Non-negotiable."
      SHOULD: "Strong default. Deviations require a stated reason in the run log."
      MAY: "Apply when it helps; advisory."
      MUST_NOT: "Prohibited. Includes anti-rules / do-not-adopt guards."
    blocking: "Blocking is derived from PRIORITY, not enforcement. A MUST failure blocks delivery; a SHOULD/MAY failure warns and is logged. This holds uniformly across hard_lint, model_verified, and soft_critic."
    enforcement:
      hard_lint: "Deterministically checkable by a local script in scripts/. Runs without consuming generation context."
      model_verified: "Script-orchestrated but uses an entailment/judge model (NLI / MiniCheck / a scoped Claude call). Subject to judge-bias caveats; not deterministic."
      soft_critic: "Judged by an all-Claude critic against a BINARY rubric question, scoped one category per pass."
      human: "Design constraint or judgment the maintainer owns; not auto-checked."
    evidence_grade:
      load_bearing_empirical: "Backed by controlled studies / meta-analyses (effect size in EM)."
      convergent_craft: "Strong practitioner consensus, often corroborated by adjacent evidence; not directly trial-tested."
      engineering: "Mechanical/structural correctness; no behavioral claim."
      contested: "Weak or disputed evidence; used only as an anti-rule or advisory."

# --- Per-run parameters (the generalization layer; rules reference these) -----
parameters:
  home_domain:
    type: "list[str]"
    desc: "The reader's existing expertise. Fills the card's anchor row; calibrates analogies and assumed vocabulary."
  target_domain:
    type: "str"
    desc: "The primer's subject (the adjacent domain being bridged into)."
  seniority_band:
    type: "enum"
    values: [early_career, mid_senior, staff_plus]
    desc: "Scales expertise-reversal suppression. staff_plus = maximal scaffolding suppression; early_career = one opt-in worked example per core concept permitted."
  length_budget:
    type: "str|int"
    desc: "Target length. Drives depth allocation via the ledger-salience proxy (claim-frequency / centrality-in-claims), since V1 has no concept graph."

# --- Circuit-breaker / calibration defaults (tune in the eval loop) ----------
budgets:
  max_retrieval_iterations: 6            # per research question x perspective
  min_sources_per_question: 2
  min_independent_nonvendor_sources_for_perf_claim: 2
  recall_calibration_target: 0.75        # fraction of recall Qs an attentive L1 reader should answer
  critic_human_divergence_recalibrate_threshold: 0.25
  max_revise_iterations: 3
  per_run_token_cap: TODO                # set in Claude Code against real runs

# --- The always-resident generator core (highest-leverage generation-time MUSTs) ---
# Mechanical hard_lint-only MUSTs are intentionally excluded here; the linter enforces them post-hoc.
must_core:
  - R-ARCH-03    # answer-first opening
  - R-SCENT-01   # predictive headings
  - R-CARD-01    # card = advance organizer
  - R-CARD-03    # skip-it-when present
  - R-SUMM-01    # thesis lede
  - R-SUMM-03    # compression gradient
  - R-SUMM-04    # fractal coherence
  - R-MV-01      # multi-view per concept
  - R-PROSE-01   # given-new flow
  - R-PROSE-02   # trade-offs as word-choice
  - R-EXPERT-01  # no worked examples in primary layer
  - R-VOCAB-01   # terminology univocity
  - R-RECALL-02  # generation-based recall
  - R-ART-03     # Toulmin recommendation blocks
  - R-EVID-01    # settled/contested/speculative
  - R-GROUND-01  # never fabricate citations/numbers
  - R-XREF-01    # cross-domain mapping in the card
  - R-FIG-01     # complete-claim captions

# =============================================================================
# RULES
# =============================================================================
rules:

  # --- PARAM: intake & calibration -------------------------------------------
  - id: R-PARAM-01
    title: "Parameters set before generation"
    directive: "Resolve home_domain, target_domain, seniority_band, and length_budget before any generation; if the request is bare, run the parameter interview first."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/structure_coverage.py::params_present", detail: "parameters.yaml exists with all four required fields"}
    phase: [0]
    counters: "LLM assumes a generic audience and writes an uncalibrated primer."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part I §1 (advance organizers contingent on reader prior knowledge)"

  - id: R-PARAM-02
    title: "Calibrate scaffolding to seniority"
    directive: "Scale scaffolding suppression to seniority_band: staff_plus gets pure contrast and no worked examples; mid_senior gets worked examples only behind deep layers; early_career may have one opt-in worked example per core concept."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: expertise-calibration, question: "Is the scaffolding density consistent with seniority_band (no primary-layer worked examples above early_career)? y/n"}
    phase: [3,4,7]
    counters: "One-size-fits-all pedagogy that over-scaffolds experts."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §5, flag 2; Kalyuga/Sweller 2003 expertise reversal"
    params_used: [seniority_band]

  # --- ARCH: document architecture -------------------------------------------
  - id: R-ARCH-01
    title: "Scope-and-decisions block"
    directive: "Open the primer with a scope-and-decisions block: intended reader, what is in/out of scope, and the 2-3 editorial decisions that shaped it."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Does the front matter state audience, scope boundaries, and key editorial decisions before content begins? y/n"}
    phase: [2,3]
    counters: "LLM dives into content with no scope contract."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §1; EM Part I §1"

  - id: R-ARCH-03
    title: "Answer-first opening (BLUF)"
    directive: "The opening states the thesis/answer first (SCQA then answer; bottom-line-up-front) and is cuttable from the bottom; no throat-clearing introduction."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Does the first paragraph state the primer's central claim/answer (not merely the topic), such that later paragraphs could be cut without losing the bottom line? y/n"}
    phase: [3]
    counters: "LLM buries the lede behind generic introduction."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part I §1 (inverted pyramid/BLUF), Part II §2 (Minto)"

  - id: R-ARCH-04
    title: "Goal-tuned reading paths"
    directive: "Include 2-3 goal-tuned reading paths (e.g., architect-a-system / audit-an-existing-one / research-the-space), each with a one-line who-this-is-for."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Are there >=2 goal-tuned reading paths with audience notes? y/n"}
    phase: [2,3]
    counters: "LLM assumes a single linear read."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §1"

  - id: R-ARCH-05
    title: "Heading hierarchy contract"
    directive: "h2 = section (full field-guide layer); h3 = subsection (sub-sum + nav + TOC entry); h4 = sub-subsection (body only, NOT in nav/TOC)."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/structure_coverage.py::heading_hierarchy", detail: "h4 absent from nav/TOC; every h3 in TOC"}
    phase: [3,7]
    counters: "LLM puts everything at one level or floods nav with h4s."
    evidence_grade: engineering
    evidence_ref: "styleguide §1"

  # --- SCENT: headings/labels as information scent ---------------------------
  - id: R-SCENT-01
    title: "Predictive, claim-bearing headings"
    directive: "Every heading is a complete, predictive claim or question; a reader who reads only the headings can reconstruct the section's gist. Banned generic labels: Overview, Introduction, Key Concepts, Background, Conclusion, Miscellaneous."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Could a reader reconstruct the gist from headings alone, AND are all generic-label headings eliminated? y/n", also_hard_lint: "checks/structure_coverage.py::banned_heading_terms", pass_example: "Headings read as 'Why long context did not kill chunking' / 'When a reranker is dead weight' — claims, not 'Background'/'Overview'."}
    phase: [2,3]
    counters: "LLM defaults to generic topic-label headings, forcing F-pattern scanning."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §3 (information foraging; F-pattern vs layer-cake)"

  - id: R-SCENT-02
    title: "Parallel sibling headings"
    directive: "Sibling headings share grammatical form."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Are sibling headings grammatically parallel? y/n"}
    phase: [3]
    counters: "Mixed heading forms degrade scannability."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part I §3"

  # --- CARD: the at-a-glance card --------------------------------------------
  - id: R-CARD-01
    title: "Card as advance organizer"
    directive: "Each section opens with an at-a-glance card that ACTIVATES prior knowledge: it leads with the home_domain anchor analogy and the 3-5 anchor concepts the reader already knows, then states what is genuinely new vs merely renamed. It is not a teaser or a summary in the section's own terminology."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Does the card open with a home-domain analogue + anchor concepts (an advance organizer), rather than restating the section's content in its own terms? y/n", pass_example: "If you know SQL query planners, reranking is the same cheap-filter-then-expensive-sort shape; new is the cross-encoder and the k knob."}
    phase: [3]
    counters: "LLM writes the card as a mini-summary (teaser), so the advance-organizer effect never fires."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §1 + flag 1; Ausubel; Luiten et al. 1980"
    params_used: [home_domain]

  - id: R-CARD-02
    title: "Card required rows"
    directive: "The card contains the required rows: idea, home-domain anchor, what's-new-vs-renamed, reach-for-it-when, skip-it-when, key-exemplar, confidence/maturity."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/structure_coverage.py::card_rows", detail: "all required <dl> rows present per section card"}
    phase: [3,7]
    counters: "LLM drops the harder rows (skip-it-when, what's-new)."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §3"

  - id: R-CARD-03
    title: "Skip-it-when is mandatory and specific"
    directive: "Every technique/approach states both when to reach for it and when to SKIP it; skip-conditions are specific, not platitudes."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Does every technique presented carry a specific skip-condition (not just a use-condition)? y/n", pass_example: "Reach for a reranker when top-k precision beats tail latency; skip it under ~100ms p99 or when recall, not ordering, is the failure."}
    phase: [3,4]
    counters: "LLM lists when to use something but never when not to."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §0, §3 (every concept paired with triggers)"

  # --- SUMM: fractal summary discipline --------------------------------------
  - id: R-SUMM-01
    title: "Thesis lede, not topic lede"
    directive: "Each section's lede states its thesis as a complete claim (cuttable from the bottom), not the section's topic."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Is the lede a complete claim defending a position, rather than a topic announcement? y/n", pass_example: "'Chunking is the unit of retrieval, and getting it wrong caps recall no matter the embedder' — a claim, not 'This section covers chunking.'"}
    phase: [3]
    counters: "Topic-label ledes ('This section covers X')."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §2,§4"

  - id: R-SUMM-02
    title: "Summary budgets and 1:1 sub-sum"
    directive: "Section summary <= 500 words (ceiling, not target); each h3 has exactly one sub-sum."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "checks/structure_coverage.py::summary_budgets", detail: "section_summary_words<=500; count(h3)==count(sub_sum)"}
    phase: [3,7]
    counters: "Runaway summaries; missing or duplicate sub-sums."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §4"

  - id: R-SUMM-03
    title: "Compression gradient"
    directive: "Each layer is materially shorter and more abstract than the one below it; a sub-sum never exceeds the length of the subsection it summarizes."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/prose_caps.py::compression_gradient", detail: "len(sub_sum) < len(source); card.idea < section_summary < section_body (token ratios)"}
    phase: [3,4,7]
    counters: "LLM makes every layer roughly the same length, collapsing the fractal into three paraphrases."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §2; Carroll 1990 minimalism; Ginns, Hollender & Reimann 2006 (minimalist-training meta-analysis) d≈1.12 (slash-the-verbiage d≈0.89)"

  - id: R-SUMM-04
    title: "Fractal coherence (stop-at-any-depth)"
    directive: "Each layer is coherent on its own; no layer assumes the reader has read a deeper layer."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: coherence, question: "Reading only this layer (lede / card / summary), is it self-contained without requiring a deeper layer? y/n", pass_example: "A card that names the analogue, anchors, and what's-new stands alone; a reader who stops there is not told to 'see the ablation below'."}
    phase: [4,7]
    counters: "Layers that reference content only defined deeper, breaking the depth dial."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part I §1 (Reigeluth epitome); styleguide §4"

  # --- DEPTH: progressive disclosure -----------------------------------------
  - id: R-DEPTH-01
    title: "L1 is actionable for a senior reader"
    directive: "Everything a senior practitioner frequently needs to ACT is present at L1 (ledes + cards); decision-critical material is never hidden in deep layers only."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Could a senior reader make the primer's routine decisions from L1 alone, without descending? y/n"}
    phase: [2,3]
    counters: "Hiding frequently-needed information behind progressive disclosure."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part I §3 (Nielsen progressive-disclosure caveat)"

  - id: R-DEPTH-02
    title: "Depth-dial mechanics"
    directive: "Emit the L1-L5 depth-dial controls and ensure each depth tier renders coherently."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "utils/parse_primer.py::depth_dial_present", detail: "depth toggles + tier classes present"}
    phase: [3,7]
    counters: "Static document with no disclosure control."
    evidence_grade: engineering
    evidence_ref: "styleguide §6"

  # --- MULTIVIEW: cognitive flexibility --------------------------------------
  - id: R-MV-01
    title: "Multi-view per core concept"
    directive: "Each core concept (from the concept-map) is presented in >=3 distinct representation modes across the document (from: architecture, tradeoff-table, failure-taxonomy, benchmark, cost-model, code-example, mental-model, historical-analogue)."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/multiview_concepts.py::modes_per_concept", detail: "count(distinct representation_modes per concept_id) >= 3", also_rubric: "Are the multiple representations genuinely different lenses, not restatements? (multiview pass)"}
    phase: [2,4,7]
    counters: "LLM gives one definition of a concept and stops."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part II §7; Spiro CFT; Jacobson & Spiro 1995"

  # --- PROSE: prose & tone ---------------------------------------------------
  - id: R-PROSE-01
    title: "Given-new information flow"
    directive: "Each sentence opens with given/linking material and ends with the new; subject entities chain across sentences; each section opening restates the prior section's terminal entity."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/coherence_givennew.py::entity_grid", detail: "flag sentences whose subject entity is absent from the previous 2 sentences; flag paragraphs where every sentence introduces a new subject entity", also_rubric: "Does the prose chain given->new rather than introducing a new subject each sentence? (coherence pass)"}
    phase: [4,7]
    counters: "LLM writes choppy prose where every sentence introduces a new subject entity."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part II §4; Haviland & Clark 1974; Barzilay & Lapata 2008"

  - id: R-PROSE-02
    title: "Trade-offs as word-choice"
    directive: "Never assert 'X is good'; always state what X buys and at what cost ('X reduces A at the cost of B')."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: expertise-calibration, question: "Are claims of merit framed as trade-offs (cost named), not as unqualified praise? y/n", pass_example: "'HNSW buys sub-linear latency at the cost of high memory and slow builds' — cost named, not 'HNSW is great.'"}
    phase: [3,4]
    counters: "LLM gives neutral 'balanced' coverage or unqualified endorsements."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §0,§8"

  - id: R-PROSE-03
    title: "Prose-first"
    directive: "Prose is the default carrier; use lists/tables/figures only where they are the clearest form; do not bullet-dump reasoning."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Is reasoning carried in prose rather than fragmented into bullets where prose would be clearer? y/n"}
    phase: [3,4]
    counters: "LLM bullets everything."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §8"

  - id: R-PROSE-04
    title: "Condition before instruction"
    directive: "In procedural sentences, state the circumstance/goal before the instruction ('To X, do Y'), so a reader can skip inapplicable steps."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "checks/prose_caps.py::condition_first", detail: "heuristic: imperative-led sentences with a trailing 'if/when' clause flagged"}
    phase: [3,4]
    counters: "LLM puts the instruction first, the condition last."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part II §9 (Google condition-first; working memory)"

  - id: R-PROSE-05
    title: "Structural length caps (not vocabulary restriction)"
    directive: "Apply soft caps: procedural sentence <=20 words, descriptive <=25, noun-cluster <=3, paragraph <=6 sentences. These are STRUCTURAL only; do NOT restrict vocabulary or flatten technical nuance."
    priority: MAY
    enforcement: hard_lint
    check: {type: script, ref: "checks/prose_caps.py::length_caps", detail: "flag cap exceedances; never check vocabulary"}
    phase: [3,4]
    counters: "Runaway sentences and deep noun stacks."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part II §3 (STE structural subset; expertise-reversal caveat on vocabulary)"
    pass_example: "n/a (advisory lint; MAY priority → warns)"

  - id: R-PROSE-06
    title: "Opinionated, asymmetric"
    directive: "Take positions weighted by leverage; allow asymmetric trade-off analysis (do not force pro/con parity or triadic lists)."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: expertise-calibration, question: "Does the text take a leverage-weighted position rather than over-symmetrizing or hedging? y/n", pass_example: "'Default to A; its one weakness, cold-start, matters only if you restart often' — a weighted call, not forced 3-pro/3-con parity."}
    phase: [3,4]
    counters: "LLM over-symmetrizes (forced 3 pros / 3 cons) and hedges."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §8"

  # --- VOCAB: vocabulary calibration & univocity -----------------------------
  - id: R-VOCAB-01
    title: "Terminology univocity"
    directive: "One canonical term per concept (from the concept-map); variant surface forms only as declared aliases. Define only topic-specific terms-of-art on first use; assume in-domain vocabulary per home_domain."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/univocity_terms.py::canonical_terms", detail: "flag concept references not matching canonical_term or declared aliases; flag definitions of assumed in-domain terms"}
    phase: [4,7]
    counters: "LLM renames the same concept three ways and over-defines basics."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part II §3 (ISO 704 univocity); styleguide §9"
    params_used: [home_domain]

  - id: R-VOCAB-02
    title: "Name and reuse handles"
    directive: "Give failure modes, patterns, and tiers short evocative names and reuse them as handles throughout."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Are recurring failure modes/patterns/tiers named and reused as consistent handles? y/n"}
    phase: [3,4]
    counters: "Unnamed concepts re-explained each time."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §9,§13"

  # --- EXPERT: expertise reversal --------------------------------------------
  - id: R-EXPERT-01
    title: "No worked examples in the primary layer"
    directive: "For mid_senior/staff_plus readers, the primary layer teaches by CONTRASTIVE COMPARISON (this-vs-that, home-vs-target), not step-by-step worked examples; worked examples appear only behind opt-in deeper layers, scaled by seniority_band."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: expertise-calibration, question: "Is the primary layer free of step-by-step worked examples (above early_career), using contrast instead? y/n", pass_example: "The API is the same three calls as any datastore; the only new part is query-by-vector — taught by contrast, no install-step walkthrough."}
    phase: [3,4,7]
    counters: "LLM defaults to tutorial-style scaffolding (its training distribution)."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §5 + flag 2; Kalyuga et al. 2001b/2003"
    params_used: [seniority_band]

  - id: R-EXPERT-02
    title: "Scaffolding behind explicit gates"
    directive: "Any novice scaffolding lives behind an explicit 'if you don't have X, read Y first' gate, never on the primary surface."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: expertise-calibration, question: "Is novice scaffolding gated behind an explicit prerequisite pointer rather than inline on the primary surface? y/n"}
    phase: [3,4]
    counters: "Inline remedial explanation that experts must read past."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §5"

  # --- RECALL: retrieval practice --------------------------------------------
  - id: R-RECALL-01
    title: "Three check-yourself Q&As per section"
    directive: "Each section ends with exactly 3 check-yourself Q&As rendered as show-answer."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/structure_coverage.py::recall_count", detail: "exactly 3 <details> recall items per section"}
    phase: [5,7]
    counters: "LLM writes 0, 1, or 7 questions inconsistently."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §5; testing effect"

  - id: R-RECALL-02
    title: "Generation-based, calibrated recall"
    directive: "Recall questions require generation (not recognition/definition trivia), are calibrated so an attentive L1 reader answers >=2/3, and at least one forces a cross-domain mapping."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Do the 3 questions require generation (not recognition), with >=1 cross-domain-mapping question, answerable from an attentive L1 read? y/n", pass_example: "'At 200ms p99 on a static 2M-vector HNSW index, what is the first knob and its cost?' — generation + transfer, not 'What does HNSW stand for?'"}
    phase: [5,7]
    counters: "LLM writes definitional or recognition-style trivia."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §4; Rowland 2014 g=0.50; Roediger & Karpicke 2006 d=0.83"

  # --- ARTIFACT: operational decision support --------------------------------
  - id: R-ART-01
    title: "Four operational artifacts present and distinct"
    directive: "Include all four, kept distinct: decision matrix, diagnostic checklist, failure-modes catalog, decision aid."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/structure_coverage.py::operational_artifacts", detail: "all four artifact types detectable and non-collapsed"}
    phase: [2,3,7]
    counters: "LLM omits some or collapses them into one table."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §7; EM Part I §4"

  - id: R-ART-02
    title: "Checklist killer-item discipline"
    directive: "The diagnostic checklist holds <=9 items per pause, action-verb-first, only high-frequency-consequential failures; it is not a glossary."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Is the checklist <=9 action-verb items of high-frequency failures (not a glossary)? y/n", pass_example: "A 6-item action-first pre-ship list of high-frequency failures, not a 30-item glossary of every consideration."}
    phase: [3]
    counters: "Exhaustive checklists that nobody runs."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §4; Gawande/WHO (36%/47% reductions)"

  - id: R-ART-03
    title: "Toulmin recommendation blocks"
    directive: "Every recommendation, design trade-off, or superiority claim is structured as Claim / Data / Warrant / Backing / Qualifier / Rebuttal, with the Qualifier (strength/conditions) and Rebuttal (failure modes) always present."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: evidence-grounding, question: "Does each recommendation carry an explicit qualifier (conditions/strength) and rebuttal (when it fails)? y/n", pass_example: "'Use hybrid when queries mix exact + semantic (qualifier); on code-like corpora BM25 alone often wins (rebuttal)' — both present."}
    phase: [3,4,7]
    counters: "LLM gives unqualified recommendations with no failure conditions."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part II §6; Toulmin 1958"

  - id: R-ART-04
    title: "Decision matrix is decisive"
    directive: "The decision matrix has named criteria, a named baseline, and a named recommendation; no 'it depends' cell without an accompanying disambiguating rule."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Does the matrix name criteria + baseline + recommendation, with every 'it depends' disambiguated? y/n", pass_example: "Matrix names a baseline ('start with pgvector'), a recommendation per column, and replaces every 'it depends' with a rule."}
    phase: [3]
    counters: "A grid of vague ratings with no interpretation."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §7"

  - id: R-ART-05
    title: "Uniform mechanism-survey shape"
    directive: "When surveying a family of mechanisms/algorithms, give each the same shape: input -> mechanism -> the one assumption that bites -> when to reach for it."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Do mechanism surveys follow the uniform input/mechanism/assumption/when shape? y/n"}
    phase: [3,4]
    counters: "Inconsistent, non-comparable mechanism descriptions."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part I §5; styleguide §10"

  # --- EVID: empirical claims & epistemic honesty ----------------------------
  - id: R-EVID-01
    title: "Settled / contested / speculative tags"
    directive: "Tag claims by epistemic status; contested claims name >=1 dissenting view; speculation never wears the grammar of fact."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: evidence-grounding, question: "Are non-settled claims tagged, with contested ones naming a dissenting view and speculation marked as such? y/n", pass_example: "'Rerankers reliably improve ordering (settled); the end-task gain is contested and dataset-dependent' — status tagged."}
    phase: [3,4,7]
    counters: "LLM smuggles speculation as settled fact."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part I §5 (hedging/GRADE); styleguide §10"

  - id: R-EVID-02
    title: "Honest-limits section"
    directive: "Include a section auditing where the primer's own thesis/framework breaks down."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Is there an honest-limits section where the thesis is shown to break down? y/n", pass_example: "'Where this primer is weakest: it treats retrieval and generation as separable, which breaks for end-to-end systems.'"}
    phase: [2,3]
    counters: "A primer that never says where it is wrong."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §10"

  - id: R-EVID-03
    title: "Independent corroboration over seniority"
    directive: "Weight replicated/independent findings over authority; performance claims require independent (non-vendor) corroboration."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: evidence-grounding, question: "Are performance claims corroborated by >=1 independent non-vendor source, not just the vendor? y/n"}
    phase: [1,6]
    counters: "LLM repeats vendor benchmarks as established fact."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §10; user vendor-skepticism"
    params_used: []

  # --- GROUND: anti-hallucination / citation grounding (verification stage) ---
  - id: R-GROUND-01
    title: "No fabricated evidence (integrity floor)"
    directive: "Every empirical claim, number, citation, or effect size MUST resolve to a source-ledger entry. Never fabricate a citation, statistic, or effect size. A believed-but-unsourced claim is marked 'unverified', never given false precision."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "verify/citation_quality.py::resolves_to_ledger", detail: "every citation marker maps to a ledger source_id; unresolved numeric/cited claims fail"}
    phase: [6]
    counters: "LLM invents 'd=0.84 (Smith 2019)' from nothing."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Addendum §A (ALCE); Part II §8 (misattribution debunk)"

  - id: R-GROUND-02
    title: "Citation recall"
    directive: "Every factual statement has at least one supporting citation into the ledger (ALCE citation recall)."
    priority: MUST
    enforcement: model_verified
    check: {type: model, ref: "verify/citation_quality.py::recall", detail: "model identifies factual statements, then checks each has >=1 supporting citation; threshold set in eval"}
    phase: [6]
    counters: "Unsupported assertions presented as fact."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Addendum §A (ALCE; Gao et al. 2023)"

  - id: R-GROUND-03
    title: "Citation precision"
    directive: "Each cited source actually supports the statement it is attached to; remove irrelevant or non-supporting citations (ALCE citation precision)."
    priority: MUST
    enforcement: model_verified
    check: {type: model, ref: "verify/citation_quality.py::precision", detail: "entailment check (NLI/MiniCheck or scoped Claude) that the cited quote supports the claim"}
    phase: [6]
    counters: "Decorative citations that don't support the claim."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Addendum §A (ALCE)"

  - id: R-GROUND-04
    title: "Recency / version freshness"
    directive: "Named technologies/libraries/models carry current versions; flag any version reference older than its freshness TTL."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "checks/recency_versions.py::version_freshness", detail: "extract named tech -> compare to live version -> flag stale"}
    phase: [1,6]
    counters: "Stale version references (recurring failure)."
    evidence_grade: engineering
    evidence_ref: "research phase 1e"

  # --- FIG: figures & diagrams ------------------------------------------------
  - id: R-FIG-01
    title: "Complete-claim captions"
    directive: "Every figure caption states the figure's conclusion as a complete sentence, not a label."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: figures, question: "Does each caption state the figure's conclusion (a claim), not just name it? y/n", pass_example: "'Figure 4: ingestion is parallel up to the embed step, the throughput bottleneck' — a conclusion, not 'Figure 4: the pipeline.'"}
    phase: [5,7]
    counters: "LLM writes 'Figure 3: architecture'."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §3,§5 (Schriver: captions read first)"

  - id: R-FIG-02
    title: "One emphasis, shared vocabulary"
    directive: "Each figure emphasizes exactly one component (the most important / safety-critical) and reuses a shared visual vocabulary (outlined / light-filled / solid-filled boxes; solid / dashed arrows)."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: figures, question: "Is exactly one element emphasized, using the shared box/arrow vocabulary? y/n", pass_example: "One box outlined as the safety-critical component, shared box/arrow vocabulary across figures — not every node bolded."}
    phase: [5]
    counters: "Everything emphasized (so nothing is); ad hoc visual style per figure."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §12; Tufte"

  - id: R-FIG-03
    title: "Spatial contiguity"
    directive: "Place each label adjacent to the graphic element it describes; if separation is unavoidable, replicate the key label inline. No split attention."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: figures, question: "Are labels adjacent to their referents (no split attention)? y/n"}
    phase: [5]
    counters: "Legend-far-from-data layouts."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §5 / Part III §D; Ginns 2006 spatial-contiguity meta-analysis d≈0.72 (combined ~0.85); Schroeder & Cenkci 2018 g≈0.63; up to d≈1.10 in Mayer's lab on complex materials"

  - id: R-FIG-04
    title: "Figure accessibility"
    directive: "Every figure carries aria-label + role=img + a standalone figcaption."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "utils/parse_primer.py::figure_a11y", detail: "each <svg>/figure has aria-label, role=img, figcaption"}
    phase: [5,7]
    counters: "Inaccessible figures with no text alternative."
    evidence_grade: engineering
    evidence_ref: "styleguide §12"

  - id: R-FIG-05
    title: "Small multiples for comparison"
    directive: "Render comparisons as small-multiple tables/charts sharing one structure, not a single composite figure."
    priority: MAY
    enforcement: soft_critic
    check: {type: rubric, pass: figures, question: "Are comparisons shown as small multiples rather than one overloaded composite? y/n"}
    phase: [5]
    counters: "Overloaded composite comparison figures."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part I §5; Tufte"

  # --- XREF: cross-domain mapping & cross-referencing ------------------------
  - id: R-XREF-01
    title: "Cross-domain mapping lives in the card"
    directive: "Where a home-domain analogue exists, it appears in the L1 card's opening sentence, not buried in a footnote or aside."
    priority: MUST
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Is the home-domain mapping in the card's opening (L1), not below it? y/n", pass_example: "The home-domain analogue is the card's first sentence, not a 'see footnote 7' aside."}
    phase: [3,4]
    counters: "LLM relegates the highest-yield analogy to a 'see also'."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Part I §5 + flag 3; Gentner; fuzzy-trace; advance organizer"
    params_used: [home_domain]

  - id: R-XREF-02
    title: "References resolve; nav/TOC in sync"
    directive: "Every internal cross-reference resolves; nav and TOC are in sync with headings; no phantom references to figures/tables ('as shown below')."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/structure_coverage.py::xrefs_resolve", detail: "all anchors resolve; nav/TOC == headings; no phantom figure/table refs"}
    phase: [7]
    counters: "LLM emits broken refs and phantom 'see Figure X' pointers."
    evidence_grade: engineering
    evidence_ref: "styleguide §11,§14; deep-primer Phase 4 self-check"

  - id: R-XREF-03
    title: "Edges realized as cross-references"
    directive: "Important concept-map relations are realized as cross-references in prose, so the document reads as a navigable web."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Are the key concept relationships surfaced as cross-references rather than left implicit? y/n"}
    phase: [4]
    counters: "Linear document that ignores conceptual dependencies."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §11"

  # --- CONSIST: consistency & build invariants -------------------------------
  - id: R-CONSIST-01
    title: "1:1 field-guide coverage"
    directive: "Every section has lede + card + recall, and every h3 has exactly one sub-sum; a section summary is required only when the section body exceeds the length threshold (~400 words), so thin sections stay lean (see R-DEPTH-03)."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/structure_coverage.py::layer_coverage", detail: "per-section lede+card+recall present; h3:sub_sum == 1:1; section_summary present iff body_words > 400"}
    phase: [7]
    counters: "Sections missing a required layer; or a full summary manufactured for a thin section (padding)."
    evidence_grade: engineering
    evidence_ref: "styleguide §14; reconciled with R-DEPTH-03"

  - id: R-CONSIST-02
    title: "Stable block IDs + embedded metadata"
    directive: "Every section/subsection/card/figure carries a stable data-block-id; the HTML embeds a primer-meta JSON (parameters, frozen ledger snapshot, concept-map, lint report)."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "utils/parse_primer.py::block_ids_and_meta", input: html, detail: "block_ids present and unique; primer-meta JSON parseable and complete"}
    phase: [3,7]
    counters: "Whole-document regeneration on revision (no targetable blocks); non-reproducible output."
    evidence_grade: engineering
    evidence_ref: "V1 plan (block-scoped revision; reproducibility snapshot)"

  - id: R-CONSIST-03
    title: "Footnotes balanced"
    directive: "Every footnote marker has a matching definition and vice versa."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "checks/structure_coverage.py::footnote_balance", detail: "markers == definitions"}
    phase: [7]
    counters: "Dangling or orphaned footnotes."
    evidence_grade: engineering
    evidence_ref: "styleguide §14"

  # --- REJECT: anti-rules / do-not-adopt guards ------------------------------
  - id: R-REJECT-01
    title: "Do not adopt E-Prime"
    directive: "Do not impose E-Prime (elimination of 'to be') as a writing constraint."
    priority: MUST_NOT
    enforcement: human
    check: {type: human, inspect: "no E-Prime constraint in generator/critic prompts"}
    phase: []
    counters: "Importing an over-extended general-semantics rule with no comprehension evidence."
    evidence_grade: contested
    evidence_ref: "EM Part II §8 (no evidence; '4-16x compression' is a misattribution)"

  - id: R-REJECT-02
    title: "UID is diagnostic only"
    directive: "Do not use language-model surprisal smoothing as an editing target; surprisal spikes are a diagnostic heuristic for human review only."
    priority: MUST_NOT
    enforcement: human
    check: {type: human, inspect: "no surprisal-smoothing rewrite step in the pipeline"}
    phase: []
    counters: "Mistaking a production-side psycholinguistic theory for a reading intervention."
    evidence_grade: contested
    evidence_ref: "EM Part II §5"

  - id: R-REJECT-03
    title: "No strict MECE gate"
    directive: "Do not enforce strict MECE partitioning as a quality gate; use it only as a framing heuristic."
    priority: MUST_NOT
    enforcement: human
    check: {type: human, inspect: "no MECE-partition gate in lints/critics"}
    phase: []
    counters: "Forcing artificial non-overlap on conceptual material."
    evidence_grade: contested
    evidence_ref: "EM Part II §2"

  - id: R-REJECT-04
    title: "No RST auto-rendering"
    directive: "Do not auto-collapse or restructure content from RST parser output; RST is a soft signal only (parser accuracy ~= human agreement floor)."
    priority: MUST_NOT
    enforcement: human
    check: {type: human, inspect: "no rendering decision gated on an RST parse"}
    phase: []
    counters: "Driving deterministic UI from an unreliable discourse parse."
    evidence_grade: contested
    evidence_ref: "EM Part II §1 (SOTA ~57 F1 vs ~55 F1 human IAA)"

  - id: R-REJECT-05
    title: "Critics never score holistic quality"
    directive: "Critic prompts MUST ask binary single-criterion compliance questions only; never 'is this good / thorough / high-quality?'. This is the primary guard against verbosity and self-preference (family) bias in an all-Claude judge."
    priority: MUST_NOT
    enforcement: human
    check: {type: human, inspect: "every critic-prompt question is binary and single-criterion; swap-and-average on any pairwise call; gating calls run >=2x"}
    phase: [7]
    counters: "Holistic LLM-judge scoring rewards length (verbosity bias) and Claude-judging-Claude self-preference, undermining minimalism."
    evidence_grade: load_bearing_empirical
    evidence_ref: "EM Addendum §D (LLM-as-judge bias: position/verbosity/family; swap-and-average; >25% divergence -> recalibrate)"

  # --- v0.2 additions --------------------------------------------------------
  - id: R-ARCH-06
    title: "Output length tracks the budget"
    directive: "Total length stays within length_budget; allocate depth by ledger-salience — high-centrality concepts get full field-guide treatment, low-salience ones get a mention — rather than padding every section uniformly."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "checks/structure_coverage.py::length_budget", detail: "total words within the budget band; flag uniform-depth padding via per-section length variance"}
    phase: [2,3,7]
    counters: "LLM ignores the length budget and pads every section to similar length regardless of salience."
    evidence_grade: engineering
    evidence_ref: "styleguide §6; EM Part I §2 (minimalism)"
    params_used: [length_budget]

  - id: R-ART-06
    title: "Annotated further-reading"
    directive: "End with a curated further-reading list; each entry carries a one-line note on what it offers and who it is for — never a bare link dump."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: structure, question: "Does each further-reading entry carry a one-line what-it-offers / who-it's-for note rather than a bare link? y/n", pass_example: "'Lewis et al. 2020 — the original RAG paper; read for the retriever-generator split, skip if you only need the production view.'"}
    phase: [3]
    counters: "LLM dumps a bare list of links with no annotation."
    evidence_grade: convergent_craft
    evidence_ref: "styleguide §further-reading; deep-primer Phase 5"

  - id: R-DEPTH-03
    title: "Scale the apparatus to substance"
    directive: "Match the field-guide apparatus to each section's substance: a thin section may carry a lede and a brief card without the heavier artifacts; never manufacture cards, recall questions, or artifacts to fill a quota where they add nothing."
    priority: SHOULD
    enforcement: soft_critic
    check: {type: rubric, pass: expertise-calibration, question: "Is the apparatus proportionate to each section's substance, with no padded or quota-filling cards/recall/artifacts? y/n", pass_example: "A two-paragraph section carries a lede and a one-line card and stops; it does not invent a decision matrix or three recall questions to look complete."}
    phase: [2,3,7]
    counters: "LLM applies the full heavy apparatus uniformly, padding thin sections and fighting minimalism."
    evidence_grade: convergent_craft
    evidence_ref: "EM Part I §2 (minimalism); EM Part I §3 (progressive disclosure)"

  # --- PROJ: IR-first & the two-output projection contract --------------------
  - id: R-PROJ-01
    title: "IR is canonical"
    directive: "Drafting emits the structured document IR; the HTML and the distilled LLM-MD are both rendered FROM it and are never hand-edited. The IR is the single source of truth; lints and critics read the IR."
    priority: MUST
    enforcement: human
    check: {type: human, inspect: "both projections are render outputs of the same document-ir; no manual edits to rendered artifacts"}
    phase: [3,8]
    counters: "Editing the HTML directly, so the two artifacts and the IR drift."
    evidence_grade: engineering
    evidence_ref: "artifact-schemas.md (Document IR); design decision (IR-first)"

  - id: R-PROJ-02
    title: "Block-id alignment across projections"
    directive: "Every block_id emitted in the LLM-MD exists in the HTML and vice versa, except blocks intentionally removed by the role filter; a citation by block_id resolves in either artifact."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "render/check_alignment.py::block_ids", input: projections, detail: "set(md block_ids) subset of set(html block_ids); the diff is exactly the role-filtered roles"}
    phase: [8]
    counters: "Renderers assign different ids, breaking cross-artifact traceability."
    evidence_grade: engineering
    evidence_ref: "artifact-schemas.md (Projections); design decision (align by block-id)"

  - id: R-PROJ-03
    title: "LLM-MD is operationally distilled"
    directive: "The LLM-MD keeps the operational core (claims, Toulmin recommendations, decision matrix, figure captions, glossary, annotated further-reading) and drops pedagogical apparatus (recall questions; the advance-organizer hook framing of cards)."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "render/render_llm_md.py::role_filter", input: llm_md, detail: "no role=recall blocks in md; cards reduced to their information content"}
    phase: [8]
    counters: "Shipping the human pedagogy verbatim as the LLM context source."
    evidence_grade: convergent_craft
    evidence_ref: "design decision (operationally distilled); EM Part I §2 (minimalism)"

  - id: R-PROJ-04
    title: "LLM-MD chunks are self-contained"
    directive: "Each LLM-MD block stands alone when retrieved: referents restated, no cross-block anaphora ('as above'); cross-chunk minimalism is suspended while within-chunk minimalism is kept. Each rewritten block must still entail its source claim_ids."
    priority: MUST
    enforcement: model_verified
    check: {type: model, ref: "verify/chunk_selfcontained.py::entailment", input: llm_md, detail: "no dangling anaphora; rewritten block entails its claim_ids (NLI/MiniCheck or scoped Claude)"}
    phase: [8]
    counters: "Given->new flow (R-PROSE-01) leaves a chunk leaning on its neighbors, useless when retrieved alone."
    evidence_grade: convergent_craft
    evidence_ref: "EM Addendum §A (attributable generation); artifact-schemas.md (Projections)"

  - id: R-PROJ-05
    title: "Provenance surfaced inline"
    directive: "Every claim block carries a provenance tag (verified | inferred | unverified) and its source_ids, surfaced inline in BOTH projections; version/SOTA claims are flagged verified-against-source vs inferred."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "checks/provenance.py::tagged", detail: "every block with claim_ids has a provenance value; verified implies >=1 source_id"}
    phase: [6,8]
    counters: "The reader/LLM cannot tell a web-verified claim from a training-recalled one (dry-run gap G4)."
    evidence_grade: convergent_craft
    evidence_ref: "dry-run finding G4; EM Addendum §A"

  - id: R-PROJ-06
    title: "LLM-MD drops SVG, keeps captions"
    directive: "The LLM-MD omits SVG/figure markup and keeps each figure's complete-claim caption as text."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "render/render_llm_md.py::no_svg", input: llm_md, detail: "no <svg> in md; each figure's figcaption present as text"}
    phase: [8]
    counters: "SVG XML as token-noise in an LLM context source."
    evidence_grade: engineering
    evidence_ref: "design decision (modality); R-FIG-01 (captions are complete claims)"

  # --- CONV: convergence guard for the escalate (re-front-load) loop -----------
  - id: R-CONV-01
    title: "Escalate loop terminates in a valid terminal state"
    directive: "The re-front-load (escalate) loop runs at most K_MAX cycles and ends in exactly one of: a coherent draft, a footnoted residual, a rendered contested-structure block, or a chaotic-scope flag. The deepen path is separately bounded by max_dives per draft."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/convergence.py::terminal_state", input: convergence-log, detail: "convergence-log shows <=K_MAX cycles and a single valid terminal regime; no escalate decision after K_MAX"}
    phase: [3]
    counters: "A loose escalate threshold oscillates: each redraft surfaces a new structural wrinkle and the loop never terminates."
    evidence_grade: engineering
    evidence_ref: "convergence-guard spec (artifact-schemas.md); design decision (loose escalate + auto-tighten)"

  - id: R-CONV-02
    title: "Structural classification is model-judged; structural distance is deterministic"
    directive: "Deciding whether a finding is structural and what concept-map edits it implies is model-judged; computing structural distance, the tau schedule, convergence ratios, and trajectory clustering is deterministic code. Never compute struct_distance or the regime with an LLM call."
    priority: MUST
    enforcement: human
    check: {type: human, inspect: "research/convergence.py is pure/deterministic (struct_distance, tau, classify_trajectory); the judge supplies only scan_for_structural + implied_edits"}
    phase: [3]
    counters: "Making struct_distance or convergence an LLM call destroys reproducibility of the termination decision."
    evidence_grade: engineering
    evidence_ref: "convergence-guard spec; local/model split (CLAUDE.md)"

  # --- DISC: discovery campaign (deep-research as a recall layer) --------------
  - id: R-DISC-01
    title: "Leads, not evidence"
    directive: "Discovery output enters the pipeline only as leads: an accepted topic-lead becomes a question in the research-plan, an accepted source-lead becomes a fetch candidate. The grounding loop then independently fetches, quotes (<=15 words), and provenance-tags. A discovery lead is never itself a ledger claim."
    priority: MUST
    enforcement: human
    check: {type: human, inspect: "no ledger entry is grounded solely on a discovery-lead URL without an independent grounding-loop fetch"}
    phase: [1]
    counters: "Treating deep-research's synthesized claims as evidence, collapsing provenance to 'the research agent asserted it'."
    evidence_grade: engineering
    evidence_ref: "design (augment-not-replace; leads-not-evidence); EM Addendum §A (attributable generation)"

  - id: R-DISC-02
    title: "Framing diversity per wave"
    directive: "Each discovery wave runs >= MIN_FRAMINGS briefs spanning distinct cells of the diversity matrix (framing/persona x decomposition angle x source-class x seed stance), with >=1 deliberately orthogonal framing (contrarian / adjacent-field) per wave; inter-run novelty is measured and redundant archetypes pruned."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/discovery.py::framing_diversity", input: discovery-log, detail: "each wave's brief manifest covers >= MIN_FRAMINGS distinct matrix cells incl. >=1 orthogonal"}
    phase: [1]
    counters: "Cosmetically-different briefs pay Nx tokens for 1x recall; the ensemble decorrelation is lost."
    evidence_grade: convergent_craft
    evidence_ref: "design (diversity is the lever; blind-spot decorrelation)"

  - id: R-DISC-03
    title: "Saturation-gated termination"
    directive: "The campaign runs waves until the novel-lead fraction (vs the accepted set, diversity-aware) falls below SATURATION_THRESHOLD or MAX_WAVES is hit; the per-wave saturation metric is recorded in discovery-log."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/discovery.py::saturation_terminal", input: discovery-log, detail: "discovery-log shows waves<=MAX_WAVES, per-wave novel_fraction recorded, terminal in {saturated, max_waves}"}
    phase: [1]
    counters: "Open-ended sweeping (cost/time) or premature stop (missed blind spots)."
    evidence_grade: engineering
    evidence_ref: "design (saturation stopping rule; theoretical saturation / info-gain plateau)"

  - id: R-DISC-04
    title: "Triage is model-judged; lead metrics are deterministic"
    directive: "Lead triage (accept/flag/drop) and salience scoring are model-judged; lead dedup/clustering, cross-run support-count, novelty diff, and the saturation metric are deterministic code. Never compute clustering or saturation with an LLM call."
    priority: MUST
    enforcement: human
    check: {type: human, inspect: "research/discovery.py is pure/deterministic (cluster_leads, support_count, novelty, saturation, framing_diversity); the judge supplies only extract_leads, triage_leads, assess_topic, wave_briefs"}
    phase: [1]
    counters: "Model-judged clustering/saturation makes the campaign's stopping decision irreproducible."
    evidence_grade: engineering
    evidence_ref: "design (model-judged gate); local/model split (CLAUDE.md); R-CONV-02"

  - id: R-DISC-05
    title: "Discovery snapshot for reproducibility"
    directive: "Every deep-research report and the accepted lead set are frozen into discovery-snapshot/; eval replays the snapshot rather than re-running the campaign; accepted leads carry their snapshot report id."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "checks/discovery.py::snapshot_complete", input: snapshot, detail: "every report referenced by an accepted lead exists in discovery-snapshot/; accepted leads carry report ids"}
    phase: [1,7]
    counters: "A nondeterministic campaign makes eval / golden runs unreproducible."
    evidence_grade: engineering
    evidence_ref: "design (reproducibility; ledger_snapshot pattern)"

  # --- GROUND addendum: ledger carries corroboration + recency ----------------
  - id: R-GROUND-05
    title: "Ledger records corroboration and recency"
    directive: "Each ledger claim supported by >1 independent source sets corroboration_count + corroborated_by; version/SOTA claims set as_of_date; cross-source disagreement uses the existing contested + contradicts (which route to the contested rendering). This is where deep-research's per-claim corroboration / conflict / recency signal lands."
    priority: SHOULD
    enforcement: hard_lint
    check: {type: script, ref: "checks/ledger.py::provenance_fields", input: ledger, detail: "claims with >1 supporting source set corroboration_count + corroborated_by; version/SOTA claims set as_of_date; contested claims list contradicts"}
    phase: [1]
    counters: "The campaign's corroboration / conflict / recency signal is lost because the ledger never records it; provenance collapses to a bare source id."
    evidence_grade: convergent_craft
    evidence_ref: "design (capture deep-research corroboration + conflict + recency); R-DISC-01; R-EVID-03; R-GROUND-04"

  - id: R-DISC-06
    title: "User seed sources: consulted, grounded, not gospel"
    directive: "User-provided seed_sources are consulted and grounded. Direct seeds (url/file/project_ref) enter as accepted source_leads, exempt from triage-drop, marked provenance_origin=user; author/entity directives seed a targeted discovery brief. Seeds are authoritative for INCLUSION only: claims from them are still corroboration-graded (R-GROUND-05) and a seed contradicted by the discovered consensus renders as contested. The R-DISC-01 firewall still applies - a seed is fetched and grounded, never pre-trusted prose."
    priority: MUST
    enforcement: hard_lint
    check: {type: script, ref: "checks/discovery.py::seed_handling", input: discovery-log, detail: "every seed_source appears in discovery-leads as status=accepted with provenance_origin=user; seed-only claims carry corroboration_count and are not promoted past their evidence"}
    phase: [0,1]
    counters: "Treating a user-named source as ground truth - laundering a single seed into an asserted claim, or dropping it because the salience gate scored it low."
    evidence_grade: convergent_craft
    evidence_ref: "design (seeds = likely-worth-looking-at, not gospel); R-DISC-01; R-GROUND-05"
